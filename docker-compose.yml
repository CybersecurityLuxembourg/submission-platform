version: '3.8'

services:
    db:
        image: mysql:8.0.36-debian
        container_name: nc3_db
        restart: unless-stopped
        command: 
            - --default-authentication-plugin=mysql_native_password
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --max_connections=200
            - --innodb_buffer_pool_size=256M
        env_file:
            - docker-compose.env
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        volumes:
            - dbdata:/var/lib/mysql
            - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M
                reservations:
                    cpus: '0.5'
                    memory: 256M

    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                PROXY: ${PROXY}
            cache_from:
                - ${DOCKER_REGISTRY}/nc3-app:latest
        image: ${DOCKER_REGISTRY}/nc3-app:latest
        container_name: nc3_app
        restart: unless-stopped
        env_file:
            - docker-compose.env
        environment:
            DB_HOST: db
            PROXY: ${PROXY}
            PHP_OPCACHE_ENABLE: 1
            PHP_OPCACHE_MEMORY_CONSUMPTION: 128
            PHP_OPCACHE_MAX_ACCELERATED_FILES: 10000
            PHP_OPCACHE_REVALIDATE_FREQ: 0
            PHP_OPCACHE_VALIDATE_TIMESTAMPS: 0
        volumes:
            - storage_data:/var/www/html/storage
            - ./public/storage:/var/www/html/public/storage
            - cache_data:/var/www/html/bootstrap/cache
        depends_on:
            db:
                condition: service_healthy
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "php-fpm", "-t"]
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '2.0'
                    memory: 1G
                reservations:
                    cpus: '0.5'
                    memory: 512M

    nginx:
        image: nginx:alpine
        container_name: nc3_nginx
        restart: unless-stopped
        ports:
            - "127.0.0.1:8080:80"
        volumes:
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/sites:/etc/nginx/conf.d:ro
            - ./public:/var/www/html/public:ro
            - storage_data:/var/www/html/storage:ro
        depends_on:
            app:
                condition: service_healthy
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M

    redis:
        image: redis:alpine
        container_name: nc3_redis
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD:-defaultpass}
        volumes:
            - redis_data:/data
        networks:
            - app_network
        healthcheck:
            test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
            interval: 10s
            timeout: 3s
            retries: 3
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M

    queue_worker:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nc3_queue_worker
        restart: unless-stopped
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        env_file:
            - docker-compose.env
        environment:
            DB_HOST: db
            REDIS_HOST: redis
            CACHE_DRIVER: redis
            QUEUE_CONNECTION: redis
        volumes:
            - storage_data:/var/www/html/storage
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - app_network
        deploy:
            replicas: 2
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

networks:
    app_network:
        driver: bridge
        ipam:
            config:
                - subnet: 172.20.0.0/24

volumes:
    dbdata:
        driver: local
    storage_data:
        driver: local
    cache_data:
        driver: local
    redis_data:
        driver: local