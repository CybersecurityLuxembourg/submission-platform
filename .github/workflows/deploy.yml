name: Deploy to Production

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
        type: boolean

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: xdebug
      
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress
      
    #  - name: Run tests
    #    run: |
    #      php artisan test 
      
    #  - name: Run static analysis
    #    run: |
    #      ./vendor/bin/phpstan analyse
    #      ./vendor/bin/psalm

  build:
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      
      - name: Install dependencies and build assets
        run: |
          npm ci
          npm run build
      
      - name: Create deployment artifacts
        run: |
          # Create artifacts in /tmp to avoid the "file changed" error
          tar -czf /tmp/build_artifacts.tar.gz public/build
          tar -czf /tmp/app_artifacts.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='storage/app/*' \
            --exclude='storage/logs/*' \
            .
          # Move artifacts back to current directory for upload
          mv /tmp/build_artifacts.tar.gz .
          mv /tmp/app_artifacts.tar.gz .
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            build_artifacts.tar.gz
            app_artifacts.tar.gz
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://applications.nc3.lu
    steps:
      - uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts
      
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_ENV_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.BASTION_SSH_PORT }} -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          
          # Configure SSH to use the bastion
          cat >> ~/.ssh/config << EOF
          Host bastion
            HostName ${{ secrets.BASTION_HOST }}
            Port ${{ secrets.BASTION_SSH_PORT }}
            User ${{ secrets.BASTION_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          
          Host production
            HostName ${{ secrets.PRODUCTION_ENV_HOST }}
            User ${{ secrets.SERVER_USERNAME }}
            ProxyJump bastion
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF
      
      - name: Deploy to server
        run: |
          # Create deployment directory with timestamp
          DEPLOYMENT_DIR="/var/www/applications.nc3.lu/deployments/$(date +%Y%m%d_%H%M%S)"
          CURRENT_LINK="/var/www/applications.nc3.lu/current"
          
          ssh production "mkdir -p $DEPLOYMENT_DIR"
          
          # Transfer artifacts
          scp app_artifacts.tar.gz production:$DEPLOYMENT_DIR/
          scp build_artifacts.tar.gz production:$DEPLOYMENT_DIR/
          
          # Execute deployment
          ssh production << 'ENDSSH'
          set -e
          
          DEPLOYMENT_DIR="$1"
          CURRENT_LINK="$2"
          APP_DIR="/var/www/applications.nc3.lu"
          
          cd $DEPLOYMENT_DIR
          
          # Extract artifacts
          tar -xzf app_artifacts.tar.gz
          tar -xzf build_artifacts.tar.gz
          rm -f *.tar.gz
          
          # Create environment files
          cat > .env << 'EOL'
          APP_NAME="NC3's Application Platform"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://applications.nc3.lu
          
          DB_CONNECTION=mysql
          DB_HOST=db
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          
          REDIS_HOST=redis
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          
          CACHE_DRIVER=redis
          SESSION_DRIVER=redis
          QUEUE_CONNECTION=redis
          
          MAIL_MAILER=smtp
          MAIL_HOST=mail.mbox.lu
          MAIL_PORT=587
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=tls
          MAIL_FROM_ADDRESS=app@nc3.lu
          MAIL_FROM_NAME="${APP_NAME}"
          EOL
          
          cat > docker-compose.env << 'EOL'
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          PROXY=${{ secrets.PROXY }}
          DOCKER_REGISTRY=${{ secrets.DOCKER_REGISTRY }}
          EOL
          
          # Link shared directories
          ln -nfs $APP_DIR/shared/storage/app storage/app
          ln -nfs $APP_DIR/shared/storage/logs storage/logs
          
          # Deploy using enhanced script
          cd $APP_DIR
          ./scripts/deploy.sh $DEPLOYMENT_DIR
          
          # If successful, update symlink
          if [ $? -eq 0 ]; then
              ln -nfs $DEPLOYMENT_DIR $CURRENT_LINK
              
              # Clean up old deployments (keep last 5)
              cd $APP_DIR/deployments
              ls -t | tail -n +6 | xargs -r rm -rf
          else
              echo "Deployment failed, not updating current symlink"
              exit 1
          fi
          ENDSSH
      
      - name: Verify deployment
        run: |
          ssh production << 'ENDSSH'
          cd /var/www/applications.nc3.lu/current
          
          # Run post-deployment checks
          docker-compose exec -T app php artisan health:check
          
          # Check application is responding
          curl -f -s -o /dev/null -w "%{http_code}" https://applications.nc3.lu/health || exit 1
          ENDSSH
      
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful!"
            # Add Slack/Discord/Email notification here
          else
            echo "Deployment failed!"
            # Add failure notification here
          fi