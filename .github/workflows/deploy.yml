name: Deploy to Production

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.14'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build
          
          # Create deployment package with all necessary files
          mkdir -p deployment_package
          cp -r public/build deployment_package/
          cp docker-compose.yml deployment_package/
          cp Dockerfile deployment_package/
          cp -r scripts deployment_package/
          cp package*.json deployment_package/
          cp medusa-config.ts deployment_package/
          cp -r src deployment_package/
          cp start.sh deployment_package/
          
          # Create tarball for more reliable transfer
          tar -czf deployment.tar.gz deployment_package/

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.PRODUCTION_ENV_SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder'
          if_key_exists: replace

      - name: Setup SSH Known Hosts
        run: |
          ssh-keyscan -p ${{ secrets.BASTION_SSH_PORT }} -H ${{ secrets.BASTION_HOST }} >> ~/.ssh/known_hosts
          ssh -p ${{ secrets.BASTION_SSH_PORT }} ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }} \
            "ssh-keyscan -H ${{ secrets.PRODUCTION_ENV_HOST }}" >> ~/.ssh/known_hosts

      - name: Transfer Deployment Package
        run: |
          # Transfer the deployment package
          scp -J ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }}:${{ secrets.BASTION_SSH_PORT }} \
            deployment.tar.gz \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.PRODUCTION_ENV_HOST }}:/tmp/

      - name: Deploy Application
        run: |
          ssh -J ${{ secrets.BASTION_USER }}@${{ secrets.BASTION_HOST }}:${{ secrets.BASTION_SSH_PORT }} \
            ${{ secrets.SERVER_USERNAME }}@${{ secrets.PRODUCTION_ENV_HOST }} "bash -s" << 'ENDSSH'
          set -e
          
          # Define deployment directory
          APP_DIR="/var/www/applications.nc3.lu"
          
          # Create backup of current deployment
          if [ -d "$APP_DIR" ]; then
            echo "Creating backup of current deployment..."
            BACKUP_DIR="/var/backups/applications.nc3.lu/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            cp -r "$APP_DIR"/{.env,docker-compose.env,storage} "$BACKUP_DIR/" 2>/dev/null || true
          fi
          
          # Extract new deployment
          cd /tmp
          tar -xzf deployment.tar.gz
          
          # Ensure directory exists
          mkdir -p "$APP_DIR"
          
          # Copy files to deployment directory
          rsync -av --delete \
            --exclude 'storage' \
            --exclude '.env' \
            --exclude 'docker-compose.env' \
            deployment_package/ "$APP_DIR/"
          
          cd "$APP_DIR"
          
          # Create .env file with proper formatting
          cat > .env << 'EOL'
          APP_NAME="NC3's Application Platform"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://applications.nc3.lu
          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US
          ASSET_URL=https://applications.nc3.lu

          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12

          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=db
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=database
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=database

          CACHE_STORE=database
          CACHE_PREFIX=

          MAIL_MAILER=smtp
          MAIL_HOST=mail.mbox.lu
          MAIL_PORT=587
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=tls
          MAIL_FROM_ADDRESS=app@nc3.lu
          MAIL_FROM_NAME="NC3's Application Platform"

          VITE_APP_NAME="NC3's Application Platform"
          EOL
          
          # Create docker-compose.env file
          cat > docker-compose.env << 'EOL'
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          PROXY=${{ secrets.PROXY }}
          EOL
          
          # Set proper permissions
          chmod 644 .env docker-compose.env
          
          # Enable Docker BuildKit
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
          
          # Run the enhanced deployment script
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
          
          # Cleanup
          rm -f /tmp/deployment.tar.gz
          rm -rf /tmp/deployment_package
          
          ENDSSH